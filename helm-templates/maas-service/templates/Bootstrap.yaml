---
apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    "helm.sh/hook": "pre-install, pre-upgrade"
    "helm.sh/hook-weight": "-150"
    "helm.sh/hook-delete-policy": "before-hook-creation, hook-succeeded"
  name: '{{ .Values.SERVICE_NAME }}-sa'
  namespace: '{{ .Values.NAMESPACE }}'
  labels:
    app.kubernetes.io/instance: "{{ .Values.SERVICE_NAME }}"
    deployment.netcracker.com/sessionId: {{ .Values.DEPLOYMENT_SESSION_ID | default "unimplemented" }}
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: maas-prehook-role
  namespace: {{ .Values.NAMESPACE }}
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-140"
    "helm.sh/hook-delete-policy": "before-hook-creation, hook-succeeded"
  labels:
    app.kubernetes.io/instance: {{ .Values.SERVICE_NAME }}
    deployment.netcracker.com/sessionId: {{ .Values.DEPLOYMENT_SESSION_ID | default "unimplemented" }}
    app.kubernetes.io/part-of: maas
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
      - serviceaccounts
      - configmaps
    verbs:
      - get
      - list
      - create
      - update
      - patch
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: maas-prehook-role-binding
  namespace: {{ .Values.NAMESPACE }}
  annotations:
    "helm.sh/hook": "pre-install, pre-upgrade"
    "helm.sh/hook-weight": "-130"
    "helm.sh/hook-delete-policy": "before-hook-creation, hook-succeeded"
  labels:
    app.kubernetes.io/instance: {{ .Values.SERVICE_NAME }}
    deployment.netcracker.com/sessionId: {{ .Values.DEPLOYMENT_SESSION_ID | default "unimplemented" }}
    app.kubernetes.io/part-of: maas
subjects:
  - kind: ServiceAccount
    name: {{ .Values.SERVICE_NAME }}-sa
    namespace: {{ .Values.NAMESPACE }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: maas-prehook-role
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.SERVICE_NAME }}-pre-hook
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "-110"
    helm.sh/hook-delete-policy: "before-hook-creation, hook-succeeded"
  labels:
    app.kubernetes.io/instance: {{ .Values.SERVICE_NAME }}
    deployment.netcracker.com/sessionId: {{ .Values.DEPLOYMENT_SESSION_ID | default "unimplemented" }}
    app.kubernetes.io/part-of: maas
spec:
  backoffLimit: 1
  template:
    metadata:
      name: {{ .Values.SERVICE_NAME }}-pre-hook
    spec:
      serviceAccountName: '{{ .Values.SERVICE_NAME }}-sa'
      terminationGracePeriodSeconds: 10
      securityContext:
        fsGroup: 1000
      volumes:
        - name: bootstrap-secrets
          secret:
            secretName: {{ .Values.SERVICE_NAME }}-env-variables
            defaultMode: 0400
      containers:
        - name: validation-hook-{{ .Values.SERVICE_NAME }}
          image: {{ .Values.DECLARATIVE_HOOK_IMAGE }}
          command: ["/bootstrap.sh"]
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: bootstrap-secrets
              mountPath: /var/run/secrets/maas/bootstrap
              readOnly: true
      restartPolicy: Never
