name: '[MaaS validation image] Go build'

permissions:
  contents: read
  packages: write

on:
  push:
    paths:
      - 'validation-image/**'
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - 'validation-image/**'

jobs:
  docker-build:
    uses: netcracker/qubership-core-infra/.github/workflows/docker-build.yaml@b9ddd544e3b5b17a31866d34c220b14e76681f31 # v2.3.0
    with:
      dry-run: false
      config-filename: "validation-image---docker-dev-config.json"
