name: '[MaaS validation image] Go build'

permissions:
  contents: read
  packages: write

on:
  push:
    paths:
      - 'validation-image/**'
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - 'validation-image/**'

jobs:
  docker-build:
    uses: netcracker/qubership-core-infra/.github/workflows/docker-build.yaml@8668020927f2a84d8d096a359c719c3c3a403520 # v2.5.0
    with:
      dry-run: false
      config-filename: "validation-image---docker-dev-config.json"
