name: '[MaaS validation image] Go build'

permissions:
  contents: read
  packages: write

on:
  push:
    paths:
      - 'validation-image/**'
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - 'validation-image/**'

jobs:
  docker-build:
    uses: netcracker/qubership-core-infra/.github/workflows/docker-build.yaml@9d3a0721f4cd8cdd9d762ac092c5c5d2d051cdea # v2.5.1
    with:
      dry-run: false
      config-filename: "validation-image---docker-dev-config.json"
