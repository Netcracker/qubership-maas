name: '[MaaS validation image] Go build'

permissions:
  contents: read
  packages: write

on:
  push:
    paths:
      - 'validation-image/**'
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - 'validation-image/**'

jobs:
  docker-build:
    uses: netcracker/qubership-core-infra/.github/workflows/docker-build.yaml@32a5b506971a029acc41bc69fd42d06137caeb36 # v1.3.3
    with:
      dry-run: false
      config-filename: "validation-image---docker-dev-config.json"
