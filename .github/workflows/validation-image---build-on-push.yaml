name: '[MaaS validation image] Go build'

permissions:
  contents: read
  packages: write

on:
  push:
    paths:
      - 'validation-image/**'
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - 'validation-image/**'

jobs:
  docker-build:
    uses: netcracker/qubership-core-infra/.github/workflows/docker-build.yaml@bc2a0bd082147e23b4091616c608a21cc2957728 # v2.4.1
    with:
      dry-run: false
      config-filename: "validation-image---docker-dev-config.json"
