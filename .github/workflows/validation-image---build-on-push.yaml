name: '[MaaS validation image] Go build'

permissions:
  contents: read
  packages: write

on:
  push:
    paths:
      - 'validation-image/**'
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - 'validation-image/**'

jobs:
  docker-build:
    uses: netcracker/qubership-core-infra/.github/workflows/docker-build.yaml@f3c183b372d92abbd4e9af4496e4c0d8d45b2282 # v1.3.1
    with:
      dry-run: false
      config-filename: "validation-image---docker-dev-config.json"
