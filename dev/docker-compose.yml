---
version: '3'
services:

  kafka:
    image: ghcr.io/netcracker/qubership-docker-kafka:main@sha256:fe0fb45dacfb42d6165cd50c811f57c18eb791fd44404a5b9c98a4ff1c3f1271
    ports:
      - "9094:9094"
    environment:
      - BROKER_ID=1
      - KRAFT_ENABLED=true
      - KRAFT_CLUSTER_ID=14v-Eh-AQaWOXixpur-etQ
      - PROCESS_ROLES=broker,controller
      - VOTERS=1@kafka:9096

      - INTERNAL_HOST_NAME=kafka
      - INTER_BROKER_HOST_NAME=kafka

      - CONF_KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9096,EXTERNAL://0.0.0.0:9094
      - CONF_KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,CONTROLLER://kafka:9096,EXTERNAL://localhost:9094
      - CONF_KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      - CONF_KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - CONF_KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - REPLICATION_FACTOR=1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest@sha256:8f2ff02d64b0a7a2b71b6b3b3148b85f66d00ec20ad40c30bdcd415d46d31818
    ports:
      - "3000:8080"
    environment:
      - DYNAMIC_CONFIG_ENABLED=true
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092